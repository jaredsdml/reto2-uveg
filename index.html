<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora básica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculadora-marco">
        <h1>Calculadora básica</h1>
        
        <input type="text" id="pantalla" readonly>
        
        <div class="rejilla-botones">
            <button class="boton-num" onclick="agregar('7')">7</button>
            <button class="boton-num" onclick="agregar('8')">8</button>
            <button class="boton-num" onclick="agregar('9')">9</button>
            <button class="boton-op" onclick="agregar('/')">/</button>
            
            <button class="boton-num" onclick="agregar('4')">4</button>
            <button class="boton-num" onclick="agregar('5')">5</button>
            <button class="boton-num" onclick="agregar('6')">6</button>
            <button class="boton-op" onclick="agregar('*')">*</button>
            
            <button class="boton-num" onclick="agregar('1')">1</button>
            <button class="boton-num" onclick="agregar('2')">2</button>
            <button class="boton-num" onclick="agregar('3')">3</button>
            <button class="boton-op" onclick="agregar('-')">-</button>
            
            <button class="boton-num" onclick="agregar('0')">0</button>
            <button class="boton-clear" onclick="limpiar()">C</button>
            <button class="boton-igual" onclick="calcular()">=</button>
            <button class="boton-op" onclick="agregar('+')">+</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
